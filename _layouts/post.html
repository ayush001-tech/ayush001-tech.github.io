---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="meta">
      {{ page.date | date: "%b %-d, %Y" }}
      {% assign words = content | strip_html | number_of_words %}
      &middot; {{ words | divided_by: 200 | at_least: 1 }} min read
    </p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

  <p class="back"><a href="{{ '/' | relative_url }}">&larr; back to all posts</a></p>

</div>
